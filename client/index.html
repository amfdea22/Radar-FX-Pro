  <script>
    // Força limpeza total do cache e service worker para evitar versão antiga
    (async function() {
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        for (const r of regs) {
          await r.unregister();
          console.log('SW desregistrado:', r);
        }
      }
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
      // Se tinha SW ativo, recarrega para garantir versão nova
      if (window.__swCleaned) window.location.reload();
      window.__swCleaned = true;
    })();
  </script>
  <title>Radar-FX | Simulador & Gestão de Trade</title>
