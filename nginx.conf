events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # ─── Timeouts ─────────────────────────────────────────────
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;
    keepalive_timeout 65s;

    # ─── Rate Limit ───────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=biometric:10m rate=10r/s;

    # ─── Segurança ────────────────────────────────────────────
    proxy_hide_header X-Powered-By;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── HTTP → HTTPS redirect ────────────────────────────────
    server {
        listen 80;
        server_name radarfx.com www.radarfx.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS server ─────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name radarfx.com www.radarfx.com;

        # ── SSL ──
        ssl_certificate /etc/ssl/live/radarfx.com/fullchain.pem;
        ssl_certificate_key /etc/ssl/live/radarfx.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5:!3DES;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── HSTS ──
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # ── Tamanho máximo do body (uploads, etc) ──
        client_max_body_size 10m;

        # ── API Principal ──
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://api:3015;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Frontend (React SPA) ──
        location / {
            proxy_pass http://api:3015;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cache de assets estáticos
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # ── Logs ──
        access_log /var/log/nginx/radar-fx-access.log;
        error_log /var/log/nginx/radar-fx-error.log;
    }
}
